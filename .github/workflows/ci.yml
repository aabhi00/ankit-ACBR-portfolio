# Python parallel:
# This file is like a Makefile or a shell script that runs automatically.
# Every key here is a configuration instruction to GitHub's servers.

name: CI/CD Pipeline

# Trigger: run this pipeline on every push to main
# and on every Pull Request targeting main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1: Quality Checks ──────────────────────────────
  quality:
    name: Type Check, Lint & Build
    runs-on: ubuntu-latest   # GitHub spins up a fresh Linux machine

    steps:
      # Step 1: Download your code onto the GitHub machine
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Node.js (like setting up a Python venv)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'        # cache node_modules so future runs are faster

      # Step 3: Install all dependencies (like pip install -r requirements.txt)
      - name: Install dependencies
        run: npm ci            # ci = clean install, stricter than npm install

      # Step 4: TypeScript type check (like running mypy)
      - name: Type check
        run: npx tsc --noEmit

      # Step 5: ESLint check (like running flake8)
      - name: Lint
        run: npm run lint

      # Step 6: Build check — does the whole app compile?
      - name: Build
        run: npm run build

  # ── Job 2: Deploy to Vercel ────────────────────────────
  # This job only runs AFTER quality job passes
  # and only on pushes to main (not on pull requests)
  deploy:
    name: Deploy to Vercel
    needs: quality             # depends on quality job succeeding
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Install Vercel CLI on the GitHub machine
      - name: Install Vercel CLI
        run: npm install -g vercel

      # Pull Vercel project settings
      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Build on Vercel's infrastructure
      - name: Build project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Deploy the built output to production
      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}